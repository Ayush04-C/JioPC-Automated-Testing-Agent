agent:
  log_dir: ~/.local/share/jiopc/agent/
  llm_prompt_file: /usr/lib/jiopc-agent/prompts/analyse_log.txt
  parts_order: [A, B, C]

web_apps:
  - name: JioSaavn
    url: https://www.jiosaavn.com
    load_timeout_ms: 8000
    bot_detection_expected: true
    elements:
      - selector: "nav"
        description: "Navigation bar"
      - selector: "input[type=text]"
        description: "Search input"
      - selector: "header"
        description: "Logo area"

  - name: JioHotstar
    url: https://www.jiohotstar.com
    load_timeout_ms: 8000
    bot_detection_expected: true
    elements:
      - selector: "#searchBar"
        description: "Search"
      - selector: "#page-container > div > div._3PHMluZ7H9jfd85qlO9xMYUhzbxY87069y3Cj6HtFWR > aside > nav"
        description: "Navigation"

  - name: JioMeet
    url: https://jiomeet.com
    load_timeout_ms: 8000
    bot_detection_expected: true
    elements:
      - selector: "main"
        description: "Main heading"
      - selector: "button"
        description: "Join or start meeting button"

  - name: JioCloud
    url: https://jiocloud.com
    load_timeout_ms: 8000
    bot_detection_expected: true
    elements:
      - selector: "nav"
        description: "Navigation"
      - selector: "button"
        description: "Login/signup button"

  - name: Google
    url: https://www.google.com
    load_timeout_ms: 8000
    bot_detection_expected: false
    elements:
      - selector: "#APjFqb"
        description: "Search box"
      - selector: "#hplogo"
        description: "Google doodle"
      - selector: "body > div.L3eUgb > div.o3j99.ikrT4e.KEY6ib > form > div:nth-child(1) > div > div.FPdoLc.T14B5e.iThwld > center > input.gNO89b"
        description: "Search button"

  - name: YouTube
    url: https://www.youtube.com
    load_timeout_ms: 8000
    bot_detection_expected: false
    elements:
      - selector: "#center > yt-searchbox > div.ytSearchboxComponentInputContainer > div > form > input"
        description: "Search input"
      - selector: "#logo-icon > span > div"
        description: "Logo"
      - selector: "#guide-renderer"
        description: "Navigation"

  - name: Wikipedia
    url: https://www.wikipedia.org
    load_timeout_ms: 8000
    bot_detection_expected: false
    elements:
      - selector: "input[type=search]"
        description: "Search input"
      - selector: "#searchLanguage"
        description: "Language selector"
      - selector: "h1"
        description: "Main heading"

  - name: GitHub
    url: https://www.github.com
    load_timeout_ms: 8000
    bot_detection_expected: false
    elements:
      - selector: "body > div.logged-in.env-production.page-responsive.full-width > div.position-relative.header-wrapper.js-header-wrapper"
        description: "Nav"
      - selector: "#_r_63_--label"
        description: "Sign out"
      - selector: "#dashboard > div > div.copilotPreview__container > react-partial > div > div > div.CopilotChatInputPartial-module__header__m_Kox > div > div:nth-child(1) > h2"
        description: "Heading"

