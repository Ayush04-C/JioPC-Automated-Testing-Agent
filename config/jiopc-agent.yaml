agent:
  log_dir: ~/.local/share/jiopc/agent/
  llm_prompt_file: /usr/lib/jiopc-agent/prompts/analyse_log.txt
  parts_order: [A, B, C]

web_apps:
  - name: JioSaavn
    url: https://www.jiosaavn.com
    load_timeout_ms: 8000
    bot_detection_expected: true
    elements:
      - selector: "nav"
        description: "Navigation bar"
      - selector: "input[type=text]"
        description: "Search input"
      - selector: "header"
        description: "Logo area"

  - name: JioCinema
    url: https://www.jiocinema.com
    load_timeout_ms: 8000
    bot_detection_expected: true
    elements:
      - selector: "header"
        description: "Main header"
      - selector: "[role=search]"
        description: "Search input"
      - selector: "[role=navigation]"
        description: "Navigation"

  - name: JioMeet
    url: https://jiomeet.com
    load_timeout_ms: 8000
    bot_detection_expected: true
    elements:
      - selector: "main"
        description: "Main heading"
      - selector: "button"
        description: "Join or start meeting button"

  - name: JioCloud
    url: https://jiocloud.com
    load_timeout_ms: 8000
    bot_detection_expected: true
    elements:
      - selector: "nav"
        description: "Navigation"
      - selector: "button"
        description: "Login/signup button"

  - name: Google
    url: https://www.google.com
    load_timeout_ms: 8000
    bot_detection_expected: false
    elements:
      - selector: "input[name=q]"
        description: "Search input"
      - selector: "input[name=btnK]"
        description: "Search button"
      - selector: "img[alt='Google']"
        description: "Google logo"

  - name: YouTube
    url: https://www.youtube.com
    load_timeout_ms: 8000
    bot_detection_expected: false
    elements:
      - selector: "input[name=search_query]"
        description: "Search input"
      - selector: "#logo"
        description: "YouTube logo"
      - selector: "nav"
        description: "Navigation"

  - name: Wikipedia
    url: https://www.wikipedia.org
    load_timeout_ms: 8000
    bot_detection_expected: false
    elements:
      - selector: "input[type=search]"
        description: "Search input"
      - selector: "#searchLanguage"
        description: "Language selector"
      - selector: "h1"
        description: "Main heading"

  - name: GitHub
    url: https://www.github.com
    load_timeout_ms: 8000
    bot_detection_expected: false
    elements:
      - selector: "nav"
        description: "Navigation"
      - selector: "a[href*='/login']"
        description: "Sign in link"
      - selector: "h1"
        description: "Hero heading"

native_apps:
  # Daksh fills this in his branch

desktop_presence:
  # Daksh fills this in his branch
