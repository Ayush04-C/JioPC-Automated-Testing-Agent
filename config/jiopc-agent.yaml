agent:
  log_dir: ~/.local/share/jiopc/agent/
  llm_prompt_file: /usr/lib/jiopc-agent/prompts/analyse_log.txt
  parts_order: [A, B, C]

web_apps:
  - name: JioSaavn
    url: https://www.jiosaavn.com
    load_timeout_ms: 10000
    bot_detection_expected: true
    elements:
      - selector: "nav"
        description: "Main navigation bar"
      - selector: "div.play-button"
        description: "Play button for content"
        
  - name: JioCinema
    url: https://www.jiocinema.com
    load_timeout_ms: 12000
    bot_detection_expected: true
    elements:
      - selector: "header"
        description: "Main header"
      - selector: ".video-player"
        description: "Video player container"
        
  - name: JioMeet
    url: https://jiomeetpro.jio.com
    load_timeout_ms: 8000
    bot_detection_expected: true
    elements:
      - selector: ".join-meeting-btn"
        description: "Join meeting button"
      - selector: "form"
        description: "Login form"
        
  - name: JioCloud
    url: https://www.jiocloud.com
    load_timeout_ms: 8000
    bot_detection_expected: true
    elements:
      - selector: ".login-btn"
        description: "Login button"
        
  - name: Google
    url: https://www.google.com
    load_timeout_ms: 5000
    bot_detection_expected: false
    elements:
      - selector: "input[name='q']"
        description: "Search input box"
      - selector: "input[name='btnK']"
        description: "Search button"
        
  - name: YouTube
    url: https://www.youtube.com
    load_timeout_ms: 8000
    bot_detection_expected: false
    elements:
      - selector: "ytd-searchbox"
        description: "Search box"
      - selector: "video"
        description: "Video element"
        
  - name: Wikipedia
    url: https://www.wikipedia.org
    load_timeout_ms: 4000
    bot_detection_expected: false
    elements:
      - selector: "#searchInput"
        description: "Search input"
      - selector: ".central-textlogo"
        description: "Wikipedia logo"
        
  - name: GitHub
    url: https://github.com
    load_timeout_ms: 6000
    bot_detection_expected: false
    elements:
      - selector: "header"
        description: "Main header"
      - selector: "form.js-site-search-form"
        description: "Search form"

native_apps:
  # Daksh fills this in his branch
  - name: Calculator
    binary: gnome-calculator
    startup_timeout_ms: 5000

  - name: Terminal
    binary: qterminal
    startup_timeout_ms: 5000

  - name: File Manager
    binary: pcmanfm-qt
    startup_timeout_ms: 5000

  - name: Text Editor
    binary: featherpad
    startup_timeout_ms: 5000

  - name: Firefox
    binary: firefox
    startup_timeout_ms: 8000

  - name: Google Chrome
    binary: google-chrome
    startup_timeout_ms: 8000

  - name: LibreOffice Writer
    binary: libreoffice
    arguments:
      - --writer
    startup_timeout_ms: 8000

  - name: LibreOffice Calc
    binary: libreoffice
    arguments:
      - --calc
    startup_timeout_ms: 8000

  - name: LibreOffice Impress
    binary: libreoffice
    arguments:
      - --impress
    startup_timeout_ms: 8000

  - name: Image Viewer
    binary: lximage-qt
    startup_timeout_ms: 5000

  - name: Settings
    binary: lxqt-config
    startup_timeout_ms: 5000

  - name: Process Viewer
    binary: qps
    startup_timeout_ms: 5000

  - name: Notes
    binary: feathernotes
    startup_timeout_ms: 5000

  - name: Audacious
    binary: audacious
    startup_timeout_ms: 5000

  - name: Software Center
    binary: snap-store
    startup_timeout_ms: 8000

