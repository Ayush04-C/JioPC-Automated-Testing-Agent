name: JioPC Automated Testing CI

on:
  pull_request:
    branches: [ "main" ]

jobs:
  validate-os-patch:
    runs-on: ubuntu-24.04
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg xvfb jq

      - name: Build Debian Package
        run: |
          dpkg-deb --build packaging/ jiopc-testing-agent.deb

      - name: Install Agent
        run: |
          sudo apt --reinstall install -y ./jiopc-testing-agent.deb

      - name: Run Testing Agent & Generate Analysis
        id: run-agent
        env:
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
        run: |
          # Run the agent in a headless X server to ensure native UI apps launch safely
          # We pipe the output to a file so we can extract the LLM report later
          xvfb-run jiopc-agent --analyse > analysis_output.txt || true
          
          # Extract the LLM report block safely (everything after "LLM ANALYSIS RESULT")
          # The agent prints exactly "LLM ANALYSIS RESULT" before printing the report string
          sed -n '/LLM ANALYSIS RESULT/,$p' analysis_output.txt > llm_report.txt
          
          # Pass the report content to GitHub Actions Environment Variables safely
          echo "REPORT<<EOF" >> $GITHUB_ENV
          cat llm_report.txt >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Post LLM Analysis as PR Comment
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            ## 🤖 JioPC Automated Testing Report
            *The testing agent executed the full validation suite against this OS Patch.*
            
            ```text
            ${{ env.REPORT }}
            ```
